services:
  - type: web
    name: contentpilot-backend
    runtime: node
    rootDir: cp_backend
    buildCommand: npm install && npm run db:generate && npm run db:push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_SOLO
        sync: false
      - key: RAZORPAY_PLAN_TEAM
        sync: false
      - key: RAZORPAY_PLAN_SCALE
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PORT
        value: 10000
